<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Support Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        :root {
            --navy: #10152a;
            --teal: #14b8c9;
            --teal-dark: #0d97a6;
            --purple: #6D28D9;
            --purple-dark: #5B21B6;
            --bg: #eef1f8;
            --card-radius: 20px;
            --shadow: 0 6px 24px rgba(16, 21, 42, 0.06);
            --text-dark: #1b2036;
            --text-muted: #8b93a7;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-dark);
            margin: 0;
        }

        /* ===== APP SIDEBAR ===== */

        .app-shell { display: flex; min-height: 100vh; }

        .app-sidebar {
            width: 260px;
            background: var(--navy);
            padding: 28px 18px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px 24px 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            flex-shrink: 0;
        }

        .brand h1 { font-size: 16px; font-weight: 700; color: #fff; margin: 0; }
        .brand p { font-size: 12px; color: var(--text-muted); margin: 0; }

        .menu-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            color: #5b6688;
            font-weight: 600;
            padding: 18px 12px 8px 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            color: #b6bcd0;
            text-decoration: none;
            font-size: 14.5px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all .15s ease;
        }

        .nav-item i { font-size: 17px; width: 20px; text-align: center; }

        .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }

        .nav-item.active {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: #fff;
            box-shadow: 0 6px 16px rgba(20, 184, 201, 0.35);
        }

        /* ===== MAIN AREA ===== */

        .main-area {
            flex: 1;
            padding: 28px 34px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            position: relative;
            color: var(--text-dark);
            border: none;
        }

        .icon-btn .badge-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 6px 16px 6px 6px;
            border-radius: 50px;
            box-shadow: var(--shadow);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }

        .user-chip .u-name { font-size: 13.5px; font-weight: 700; line-height: 1.1; }
        .user-chip .u-role { font-size: 11px; color: var(--text-muted); }

        /* ===== AI PAGE LAYOUT ===== */

        .ai-container {
            display: flex;
            gap: 22px;
            flex: 1;
            min-height: 0;
        }

        /* Quick-questions panel */

        .ai-sidebar {
            width: 270px;
            flex-shrink: 0;
            background: #fff;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            padding: 22px;
            display: flex;
            flex-direction: column;
        }

        .ai-sidebar h4 {
            font-size: 17px;
            font-weight: 800;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-sidebar .text-muted {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 700;
            color: var(--text-muted) !important;
            margin: 18px 0 12px 0;
        }

        .quick-question {
            width: 100%;
            text-align: left;
            background: #f5f6fb;
            border: 1px solid #eceef5;
            color: var(--text-dark);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13.5px;
            font-weight: 600;
            margin-bottom: 8px;
            transition: all .15s ease;
        }

        .quick-question:hover {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: #fff;
            border-color: transparent;
            transform: translateX(3px);
        }

        .ai-sidebar hr {
            margin: 18px 0;
            border-color: #f0f1f6;
        }

        .ai-sidebar .btn-outline-primary {
            border-radius: 12px;
            border: 1.5px solid var(--teal);
            color: var(--teal-dark);
            font-weight: 700;
            font-size: 13.5px;
        }

        .ai-sidebar .btn-outline-primary:hover {
            background: var(--teal);
            border-color: var(--teal);
            color: #fff;
        }

        /* Chat panel */

        .chat-container {
            flex: 1;
            background: #fff;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #f0f1f6;
            background: linear-gradient(135deg, var(--teal) 0%, var(--purple) 100%);
        }

        .chat-header h4 {
            margin: 0;
            font-weight: 800;
            font-size: 17px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header .badge {
            background: rgba(255,255,255,0.2) !important;
            border: 1px solid rgba(255,255,255,0.4);
            font-weight: 700;
            font-size: 11.5px;
            padding: 6px 12px;
            border-radius: 50px;
        }

        .chat-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 380px;
            background: #fafbfe;
        }

        .ai-message, .user-message {
            max-width: 72%;
            padding: 13px 17px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.55;
        }

        .ai-message {
            background: #fff;
            border: 1px solid #eceef5;
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(16,21,42,0.04);
        }

        .user-message {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-footer {
            display: flex;
            gap: 10px;
            padding: 18px 24px;
            border-top: 1px solid #f0f1f6;
            background: #fff;
        }

        .chat-footer .form-control {
            border-radius: 50px;
            background: #f5f6fb;
            border: 1px solid #eceef5;
            padding: 12px 20px;
        }

        .chat-footer .form-control:focus {
            box-shadow: 0 0 0 3px rgba(20, 184, 201, 0.15);
            border-color: var(--teal);
        }

        .chat-footer .btn-primary {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .chat-footer .btn-primary:hover {
            background: linear-gradient(135deg, var(--teal-dark), var(--teal-dark));
        }

        @media (max-width: 991px) {
            .app-sidebar { display: none; }
            .main-area { padding: 20px; }
            .ai-container { flex-direction: column; }
            .ai-sidebar { width: 100%; }
        }

    </style>

    <link href="../css/design-system.css" rel="stylesheet">
</head>

<body class="ai-page employee-theme">

    <div class="app-shell">

        <!-- ================= APP SIDEBAR ================= -->

        <aside class="app-sidebar">

            <div class="brand">
                <div class="brand-icon"><i class="bi bi-headset"></i></div>
                <div>
                    <h1>AI Help Desk</h1>
                    <p>Employee Portal</p>
                </div>
            </div>

            <div class="menu-label">MAIN MENU</div>

            <a href="dashboard.html" class="nav-item">
                <i class="bi bi-grid-fill"></i> Dashboard
            </a>

            <a href="create-ticket.html" class="nav-item">
                <i class="bi bi-plus-circle"></i> Create Ticket
            </a>

            <a href="my-tickets.html" class="nav-item">
                <i class="bi bi-ticket-perforated"></i> My Tickets
            </a>

            <a href="ai-assistant.html" class="nav-item active">
                <i class="bi bi-robot"></i> AI Assistant
            </a>

            <a href="profile.html" class="nav-item">
                <i class="bi bi-person-circle"></i> Profile
            </a>

            <a href="logout.html" class="nav-item">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>

        </aside>

        <!-- ================= MAIN ================= -->

        <main class="main-area">

            <div class="topbar">
                <button class="icon-btn"><i class="bi bi-moon-stars"></i></button>
                <button class="icon-btn">
                    <i class="bi bi-bell"></i>
                    <span class="badge-count">19</span>
                </button>
                <div class="user-chip">
                    <div class="user-avatar">A</div>
                    <div>
                        <div class="u-name">Avinash</div>
                        <div class="u-role">Employee</div>
                    </div>
                    <i class="bi bi-chevron-down" style="color:#8b93a7;font-size:12px;"></i>
                </div>
            </div>

            <div class="ai-container">

                <!-- Left Sidebar -->

                <div class="ai-sidebar">

                    <h4>
                        🤖 AI Assistant
                    </h4>

                    <p class="text-muted">

                        Quick Questions

                    </p>

                    <button class="quick-question"
                            onclick="askSuggestion('Laptop not starting')">

                        Laptop not starting

                    </button>

                    <button class="quick-question"
                            onclick="askSuggestion('Printer not working')">

                        Printer not working

                    </button>

                    <button class="quick-question"
                            onclick="askSuggestion('VPN issue')">

                        VPN Issue

                    </button>

                    <button class="quick-question"
                            onclick="askSuggestion('WiFi not connecting')">

                        WiFi Issue

                    </button>

                    <button class="quick-question"
                            onclick="askSuggestion('Outlook error')">

                        Outlook Error

                    </button>

                    <hr>

                    <a href="dashboard.html"
                       class="btn btn-outline-primary w-100">

                        ← Back to Dashboard

                    </a>

                </div>

                <!-- Chat Area -->

                <div class="chat-container">

                    <div class="chat-header">

                        <h4>

                            AI Support Assistant

                        </h4>

                        <span class="badge">

                            Online

                        </span>

                    </div>

                    <div id="chatMessages"
                         class="chat-body">

                        <div class="ai-message">

                            👋 Hello!

                            <br><br>

                            I am your AI Support Assistant.

                            Ask me any IT related issue.

                        </div>

                    </div>

                    <div class="chat-footer">

                        <input
                            id="aiQuery"
                            class="form-control"
                            placeholder="Describe your issue...">

                        <button
                            class="btn btn-primary"
                            onclick="askAI()">

                            <i class="bi bi-send-fill"></i>

                        </button>

                    </div>

                </div>

            </div>

        </main>

    </div>

<script src="../js/toast.js"></script>
<script src="../js/status-badges.js"></script>
<script src="../js/employee.js"></script>

</body>

</html>
