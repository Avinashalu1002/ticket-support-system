<!DOCTYPE html>
<html lang="en">
<head>

    <title>Employee Profile</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root {
            --navy: #10152a;
            --teal: #14b8c9;
            --teal-dark: #0d97a6;
            --purple: #6D28D9;
            --purple-dark: #5B21B6;
            --bg: #eef1f8;
            --card-radius: 22px;
            --shadow: 0 6px 24px rgba(16, 21, 42, 0.06);
            --text-dark: #1b2036;
            --text-muted: #8b93a7;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-dark);
            margin: 0;
        }

        /* ===== LAYOUT ===== */

        .app-shell { display: flex; min-height: 100vh; }

        /* ===== SIDEBAR ===== */

        .sidebar {
            width: 260px;
            background: var(--navy);
            padding: 28px 18px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px 24px 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            flex-shrink: 0;
        }

        .brand h1 { font-size: 16px; font-weight: 700; color: #fff; margin: 0; }
        .brand p { font-size: 12px; color: var(--text-muted); margin: 0; }

        .menu-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            color: #5b6688;
            font-weight: 600;
            padding: 18px 12px 8px 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            color: #b6bcd0;
            text-decoration: none;
            font-size: 14.5px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all .15s ease;
        }

        .nav-item i { font-size: 17px; width: 20px; text-align: center; }

        .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }

        .nav-item.active {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: #fff;
            box-shadow: 0 6px 16px rgba(20, 184, 201, 0.35);
        }

        /* ===== MAIN AREA ===== */

        .main-area { flex: 1; padding: 28px 34px; max-width: 100%; }

        .topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            position: relative;
            color: var(--text-dark);
            border: none;
        }

        .icon-btn .badge-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 6px 16px 6px 6px;
            border-radius: 50px;
            box-shadow: var(--shadow);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }

        .user-chip .u-name { font-size: 13.5px; font-weight: 700; line-height: 1.1; }
        .user-chip .u-role { font-size: 11px; color: var(--text-muted); }

        /* ===== PROFILE CARD ===== */

        .card {
            border: none;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--teal) 0%, var(--purple) 100%);
            padding: 44px 40px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .profile-header::after {
            content: "";
            position: absolute;
            right: -50px;
            top: -50px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }

        .profile-avatar {
            width: 116px;
            height: 116px;
            border-radius: 50%;
            margin: auto;
            background: #fff;
            color: var(--purple);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 56px;
            box-shadow: 0 10px 25px rgba(0,0,0,.15);
            position: relative;
            z-index: 1;
        }

        .profile-header h3 { font-weight: 800; position: relative; z-index: 1; }
        .profile-header p { position: relative; z-index: 1; }

        /* ===== INFO CARDS ===== */

        .info-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px;
            background: #f8f9fc;
            border: 1px solid #f0f1f6;
            border-radius: 16px;
            transition: .25s ease;
        }

        .info-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            background: #fff;
        }

        .info-icon {
            width: 46px;
            height: 46px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .icon-teal    { background: #d9f5f4; color: var(--teal-dark); }
        .icon-purple  { background: #e8e2fb; color: var(--purple); }
        .icon-orange  { background: #ffe9d6; color: #f2892b; }
        .icon-blue    { background: #dbeefc; color: #0e8fc4; }
        .icon-pink    { background: #fde1ee; color: #d6368a; }
        .icon-green   { background: #d9f5e4; color: #24b866; }

        .info-card small {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .info-card h6 {
            margin: 2px 0 0 0;
            font-weight: 700;
            font-size: 15px;
            color: var(--text-dark);
        }

        .status-pill {
            background: #d9f5e4;
            color: #24b866;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 12.5px;
            font-weight: 700;
            display: inline-block;
        }

        .back-btn-full {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            border: none;
            border-radius: 14px;
            font-weight: 700;
            padding: 13px;
            color: #fff;
        }

        .back-btn-full:hover {
            background: linear-gradient(135deg, var(--teal-dark), var(--teal-dark));
            color: #fff;
        }

        @media (max-width: 991px) {
            .sidebar { display: none; }
            .main-area { padding: 20px; }
        }

    </style>

    <link href="../css/design-system.css" rel="stylesheet">
</head>

<body class="employee-theme">

    <div class="app-shell">

        <!-- ================= SIDEBAR ================= -->

        <aside class="sidebar">

            <div class="brand">
                <div class="brand-icon"><i class="bi bi-headset"></i></div>
                <div>
                    <h1>AI Help Desk</h1>
                    <p>Employee Portal</p>
                </div>
            </div>

            <div class="menu-label">MAIN MENU</div>

            <a href="dashboard.html" class="nav-item">
                <i class="bi bi-grid-fill"></i> Dashboard
            </a>

            <a href="create-ticket.html" class="nav-item">
                <i class="bi bi-plus-circle"></i> Create Ticket
            </a>

            <a href="my-tickets.html" class="nav-item">
                <i class="bi bi-ticket-perforated"></i> My Tickets
            </a>

            <a href="profile.html" class="nav-item active">
                <i class="bi bi-person-circle"></i> Profile
            </a>

            <a href="logout.html" class="nav-item">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>

        </aside>

        <!-- ================= MAIN ================= -->

        <main class="main-area">

            <div class="topbar">
                <button class="icon-btn"><i class="bi bi-moon-stars"></i></button>
                <button class="icon-btn">
                    <i class="bi bi-bell"></i>
                    <span class="badge-count">19</span>
                </button>
                <div class="user-chip">
                    <div class="user-avatar">A</div>
                    <div>
                        <div class="u-name">Avinash</div>
                        <div class="u-role">Employee</div>
                    </div>
                    <i class="bi bi-chevron-down" style="color:#8b93a7;font-size:12px;"></i>
                </div>
            </div>

            <div class="row justify-content-center">

                <div class="col-lg-7 col-md-9">

                    <div class="card">

                        <div class="profile-header text-center">

                            <div class="profile-avatar">
                                <i class="bi bi-person-fill"></i>
                            </div>

                            <h3 id="name" class="mt-3 mb-1">
                                Employee Name
                            </h3>

                            <p class="text-light mb-0" style="opacity:.9;">
                                Employee Portal
                            </p>

                        </div>

                        <div class="p-4">

                            <div class="row g-3">

                                <div class="col-md-6">

                                    <div class="info-card">
                                        <div class="info-icon icon-teal">
                                            <i class="bi bi-envelope-fill"></i>
                                        </div>
                                        <div>
                                            <small>Email</small>
                                            <h6 id="email"></h6>
                                        </div>
                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="info-card">
                                        <div class="info-icon icon-purple">
                                            <i class="bi bi-person-badge-fill"></i>
                                        </div>
                                        <div>
                                            <small>Role</small>
                                            <h6 id="role"></h6>
                                        </div>
                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="info-card">
                                        <div class="info-icon icon-orange">
                                            <i class="bi bi-telephone-fill"></i>
                                        </div>
                                        <div>
                                            <small>Phone Number</small>
                                            <h6 id="phone"></h6>
                                        </div>
                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="info-card">
                                        <div class="info-icon icon-blue">
                                            <i class="bi bi-building-fill"></i>
                                        </div>
                                        <div>
                                            <small>Department</small>
                                            <h6 id="department"></h6>
                                        </div>
                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="info-card">
                                        <div class="info-icon icon-pink">
                                            <i class="bi bi-person-vcard-fill"></i>
                                        </div>
                                        <div>
                                            <small>Employee ID</small>
                                            <h6 id="employeeId"></h6>
                                        </div>
                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="info-card">
                                        <div class="info-icon icon-green">
                                            <i class="bi bi-check-circle-fill"></i>
                                        </div>
                                        <div>
                                            <small>Status</small>
                                            <h6>
                                                <span class="status-pill">Active</span>
                                            </h6>
                                        </div>
                                    </div>

                                </div>

                            </div>

                        </div>

                        <div class="p-4 pt-0">

                            <a
                                href="dashboard.html"
                                class="btn back-btn-full w-100">

                                <i class="bi bi-arrow-left-circle"></i>
                                Back to Dashboard

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </main>

    </div>

<script>

async function loadProfile() {

    const token =
        localStorage.getItem("token");

    const userId =
        localStorage.getItem("userId");

    try {

        const response =
            await fetch(
                `https://ticket-support-api-uyjm.onrender.com/api/Users/${userId}`,
                {
                    headers: {
                        "Authorization":
                            `Bearer ${token}`
                    }
                });

        if (!response.ok) {

            throw new Error("Failed to load profile.");

        }

        const user =
            await response.json();

        document.getElementById("name").innerText =
            user.name;

        document.getElementById("email").innerText =
            user.email;

        document.getElementById("role").innerText =
            user.role;

        document.getElementById("phone").innerText =
            user.phoneNumber;

        document.getElementById("department").innerText =
            user.department;

        document.getElementById("employeeId").innerText =
            user.employeeId;

    }
    catch (error) {

        console.error(error);

        Toast.error("Profile Load Failed", "Unable to load your profile. Please refresh the page.");

    }

}

loadProfile();

</script>

<script src="../js/toast.js"></script>
<script src="../js/status-badges.js"></script>
</body>
</html>
