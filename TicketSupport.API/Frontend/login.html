<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Ticket Support System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root {
            --navy: #10152a;
            --navy-light: #1a2140;
            --teal: #14b8c9;
            --teal-dark: #0d97a6;
            --purple: #7c5cf0;
            --purple-dark: #4f38c9;
            --bg: #eef1f8;
            --shadow: 0 20px 60px rgba(16, 21, 42, 0.12);
            --text-dark: #1b2036;
            --text-muted: #8b93a7;
        }

        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-dark);
            background: var(--bg);
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: stretch;
        }

        /* ===== LEFT PANEL ===== */

        .left-panel {
            flex: 1.1;
            background: linear-gradient(160deg, var(--navy) 0%, #1c2550 60%, var(--purple-dark) 130%);
            color: #fff;
            padding: 70px 64px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(20,184,201,0.25), transparent 70%);
            top: -140px;
            right: -140px;
        }

        .left-panel::after {
            content: "";
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,92,240,0.25), transparent 70%);
            bottom: -100px;
            left: -100px;
        }

        .left-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .left-brand .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
        }

        .left-brand span {
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.02em;
        }

        .left-panel h1 {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            max-width: 480px;
        }

        .left-panel > p {
            color: #c4c9de;
            font-size: 15.5px;
            line-height: 1.6;
            max-width: 420px;
            margin-bottom: 34px;
            position: relative;
            z-index: 1;
        }

        .left-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .left-panel ul li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14.5px;
            font-weight: 500;
            color: #e4e6f2;
        }

        .left-panel ul li .check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(20, 184, 201, 0.2);
            color: var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        /* ===== RIGHT PANEL ===== */

        .right-panel {
            flex: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg);
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: #fff;
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 44px 38px;
        }

        .logo { text-align: center; margin-bottom: 30px; }

        .logo-badge {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--teal), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            margin: 0 auto 18px auto;
        }

        .logo h2 {
            font-weight: 800;
            font-size: 22px;
            margin: 0 0 4px 0;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 13.5px;
            margin: 0;
        }

        .field-group { position: relative; margin-bottom: 16px; }

        .field-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-control {
            height: 50px;
            border-radius: 13px;
            background: #f5f6fb;
            border: 1px solid #eceef5;
            padding-left: 42px;
            font-size: 14.5px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(20, 184, 201, 0.15);
            border-color: var(--teal);
            background: #fff;
        }

        .btn-login {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            margin-top: 6px;
            transition: all .2s ease;
            box-shadow: 0 10px 24px rgba(20, 184, 201, 0.3);
        }

        .btn-login:hover {
            background: linear-gradient(135deg, var(--teal-dark), var(--teal-dark));
            transform: translateY(-1px);
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .register-link a {
            color: var(--purple);
            font-weight: 700;
            text-decoration: none;
        }

        .register-link a:hover { color: var(--purple-dark); text-decoration: underline; }

        @media (max-width: 900px) {
            .login-container { flex-direction: column; }
            .left-panel { padding: 50px 34px; }
            .left-panel h1 { font-size: 30px; }
            .right-panel { padding: 34px 20px; }
        }

    </style>

    <link href="css/design-system.css" rel="stylesheet">
</head>

<body>

<div class="login-container">

    <!-- Left Side -->

    <div class="left-panel">

        <div class="left-brand">
            <div class="brand-icon"><i class="bi bi-headset"></i></div>
            <span>AI HELP DESK</span>
        </div>

        <h1>
            AI Ticket Support System
        </h1>

        <p>
            Manage IT support requests smarter with AI-powered assistance.
        </p>

        <ul>
            <li><span class="check"><i class="bi bi-check-lg"></i></span> AI Ticket Analysis</li>
            <li><span class="check"><i class="bi bi-check-lg"></i></span> Smart Suggestions</li>
            <li><span class="check"><i class="bi bi-check-lg"></i></span> Engineer Assignment</li>
            <li><span class="check"><i class="bi bi-check-lg"></i></span> Reports &amp; Analytics</li>
        </ul>

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <div class="login-card">

            <div class="logo">

                <div class="logo-badge"><i class="bi bi-shield-lock-fill"></i></div>

                <h2>
                    Welcome Back
                </h2>

                <p>
                    Sign in to continue
                </p>

            </div>

            <div class="field-group">
                <i class="bi bi-envelope-fill"></i>
                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Enter Email">
            </div>

            <div class="field-group">
                <i class="bi bi-lock-fill"></i>
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter Password">
            </div>

            <button
                class="btn-login"
                onclick="login()">

                Sign In

            </button>

            <div class="register-link">

                <a href="register.html">

                    Create Account

                </a>

            </div>

        </div>

    </div>

</div>

<script src="js/toast.js"></script>
<script src="js/status-badges.js"></script>
<script src="js/login.js"></script>

</body>
</html>
