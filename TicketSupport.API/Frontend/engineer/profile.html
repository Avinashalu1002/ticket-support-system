<!DOCTYPE html>
<html>
<head>

    <title>Engineer Profile</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        :root{
            --violet:#8B5CF6;
            --indigo:#6366F1;
            --navy:#12131c;
            --teal-dark:#0d97a6;
            --bg:#F8FAFC;
            --card:#ffffff;
            --text:#1e293b;
            --muted:#6B7280;
            --border:rgba(15,23,42,.06);
            --shadow-sm:0 2px 10px rgba(15,23,42,.06);
            --shadow-md:0 20px 45px rgba(15,23,42,.12);
        }

        [data-theme="dark"]{
            --bg:#0b1120;
            --card:#131b2e;
            --text:#e7ecf5;
            --muted:#9aa6bd;
            --border:rgba(255,255,255,.07);
            --shadow-sm:0 2px 10px rgba(0,0,0,.35);
            --shadow-md:0 20px 45px rgba(0,0,0,.5);
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            min-height:100vh;
            background:var(--bg);
            color:var(--text);
            font-family:'Inter','Segoe UI',sans-serif;
            transition:background .3s ease, color .3s ease;
            display:flex;
            flex-direction:column;
        }

        h3{ font-family:'Sora','Segoe UI',sans-serif; font-weight:700; }

        /* ---------- TOP BAR ---------- */

        .topbar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:18px 25px;
        }

        .brand{
            display:flex;
            align-items:center;
            gap:10px;
            font-family:'Sora',sans-serif;
            font-weight:700;
            font-size:16px;
            color:var(--text);
        }

        .brand i{
            color:#A78BFA;
            background:var(--navy);
            width:38px;
            height:38px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 0 0 1px rgba(139,92,246,.25), 0 4px 14px rgba(139,92,246,.25);
        }

        .icon-btn{
            border:none;
            background:var(--card);
            color:var(--text);
            width:38px;
            height:38px;
            border-radius:50%;
            box-shadow:var(--shadow-sm);
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:background .2s ease, transform .2s ease;
        }
        .icon-btn:hover{ background:var(--border); transform:translateY(-1px); }

        /* ---------- PROFILE CARD ---------- */

        .container{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .profile-wrap{
            width:100%;
            max-width:560px;
        }

        .card{
            border:none;
            border-radius:22px;
            box-shadow:var(--shadow-md);
            background:var(--card);
            color:var(--text);
            overflow:hidden;
            opacity:0;
            transform:translateY(16px);
            animation:fadeUp .5s ease forwards;
        }

        @keyframes fadeUp{
            to{ opacity:1; transform:translateY(0); }
        }

        .profile-banner{
            padding:44px 20px 40px;
            background:linear-gradient(135deg, var(--violet) 0%, var(--indigo) 100%);
            position:relative;
            overflow:hidden;
            text-align:center;
        }
        .profile-banner::after{
            content:"";
            position:absolute;
            right:-60px;
            top:-60px;
            width:220px;
            height:220px;
            border-radius:50%;
            background:rgba(255,255,255,.12);
        }

        .profile-avatar{
            width:96px;
            height:96px;
            border-radius:50%;
            background:#ffffff;
            color:var(--violet);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:42px;
            margin:0 auto 18px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
            position:relative;
            z-index:1;
        }

        .profile-banner h3{
            color:#fff;
            margin-bottom:4px;
            position:relative;
            z-index:1;
        }

        .profile-banner .role-line{
            color:rgba(255,255,255,.85);
            font-size:14.5px;
            margin:0;
            position:relative;
            z-index:1;
        }

        .card-body-custom{
            padding:26px 26px 30px;
        }

        .info-list{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
            gap:14px;
        }

        .info-row{
            display:flex;
            align-items:center;
            gap:14px;
            padding:16px;
            background:#f8f9fc;
            border:1px solid var(--border);
            border-radius:16px;
            transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
        }

        [data-theme="dark"] .info-row{
            background:rgba(255,255,255,.03);
        }

        .info-row:hover{
            transform:translateY(-3px);
            box-shadow:var(--shadow-sm);
        }

        .info-row.full-width{
            grid-column:1 / -1;
        }

        .info-row .info-icon{
            width:44px;
            height:44px;
            border-radius:13px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:19px;
            flex-shrink:0;
        }

        .icon-teal    { background:#d9f5f4; color:var(--teal-dark); }
        .icon-purple  { background:#e8e2fb; color:var(--violet); }
        .icon-orange  { background:#ffe9d6; color:#f2892b; }
        .icon-blue    { background:#dbeefc; color:#0e8fc4; }
        .icon-pink    { background:#fde1ee; color:#d6368a; }
        .icon-green   { background:#d9f5e4; color:#24b866; }

        .info-row .info-text{
            min-width:0;
        }

        .info-row .info-text strong{
            display:block;
            font-size:11.5px;
            text-transform:uppercase;
            letter-spacing:.4px;
            color:var(--muted);
            font-weight:700;
            margin-bottom:2px;
        }

        .info-row .info-text span{
            font-size:15px;
            font-weight:700;
            word-break:break-word;
        }

        .badge.bg-success{
            background:rgba(22,163,74,.12) !important;
            color:#16A34A !important;
            font-weight:700;
            padding:6px 14px;
            border-radius:20px;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }
        .badge.bg-success::before{
            content:"";
            width:7px;
            height:7px;
            border-radius:50%;
            background:#16A34A;
        }

        .badge.bg-secondary{
            background:rgba(107,114,128,.14) !important;
            color:#6B7280 !important;
            font-weight:700;
            padding:6px 14px;
            border-radius:20px;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }
        .badge.bg-secondary::before{
            content:"";
            width:7px;
            height:7px;
            border-radius:50%;
            background:#6B7280;
        }

        .btn-primary{
            background:linear-gradient(135deg, var(--violet), var(--indigo));
            border:none;
            border-radius:12px;
            font-weight:600;
            padding:11px 28px;
            width:100%;
            margin-top:22px;
            transition:filter .2s ease, transform .2s ease;
            box-shadow:0 8px 20px rgba(99,102,241,.35);
        }
        .btn-primary:hover{
            filter:brightness(1.06);
            transform:translateY(-1px);
        }

        :focus-visible{
            outline:2px solid var(--violet);
            outline-offset:2px;
        }

        @media (prefers-reduced-motion: reduce){
            *{ animation:none !important; transition:none !important; }
        }

    </style>

</head>

<body class="bg-light">

<div class="topbar">
    <div class="brand">
        <i class="bi bi-tools"></i>
        Engineer Panel
    </div>

    <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
        <i class="bi bi-moon-stars"></i>
    </button>
</div>

<div class="container mt-3">

    <div class="profile-wrap">

        <div class="card p-0">

            <div class="profile-banner">

                <div class="profile-avatar"><i class="bi bi-person-fill"></i></div>

                <h3 id="name">Engineer</h3>

                <p class="role-line">Engineer Portal</p>

            </div>

            <div class="card-body-custom">

                <div class="info-list">

                    <div class="info-row">
                        <div class="info-icon icon-teal"><i class="bi bi-envelope-fill"></i></div>
                        <div class="info-text">
                            <strong>Email</strong>
                            <span id="email"></span>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-purple"><i class="bi bi-person-badge-fill"></i></div>
                        <div class="info-text">
                            <strong>Role</strong>
                            <span id="role"></span>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-orange"><i class="bi bi-telephone-fill"></i></div>
                        <div class="info-text">
                            <strong>Phone number</strong>
                            <span id="phone"></span>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-blue"><i class="bi bi-building-fill"></i></div>
                        <div class="info-text">
                            <strong>Department</strong>
                            <span id="department"></span>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-pink"><i class="bi bi-person-vcard-fill"></i></div>
                        <div class="info-text">
                            <strong>Employee ID</strong>
                            <span id="employeeId"></span>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-green"><i class="bi bi-check-circle-fill"></i></div>
                        <div class="info-text">
                            <strong>Status</strong>
                            <span class="badge bg-success" id="statusBadge">Active</span>
                        </div>
                    </div>

                </div>

                <a href="dashboard.html" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i>
                    Back
                </a>

            </div>

        </div>

    </div>

</div>

<script>

async function loadProfile() {

    const token =
        localStorage.getItem("token");

    const userId =
        localStorage.getItem("userId");

    setFields({
        name: localStorage.getItem("name") || "Engineer",
        email: localStorage.getItem("email") || "",
        role: localStorage.getItem("role") || "",
        phoneNumber: localStorage.getItem("phoneNumber") || "",
        department: localStorage.getItem("department") || "",
        employeeId: localStorage.getItem("employeeId") || "",
        status: localStorage.getItem("status") || "Active"
    });

    if (!userId) {
        return;
    }

    try {

        const response =
            await fetch(
                `https://ticket-support-api-uyjm.onrender.com/api/Users/${userId}`,
                {
                    headers: {
                        "Authorization":
                            `Bearer ${token}`
                    }
                });

        if (!response.ok) {

            throw new Error("Failed to load profile.");

        }

        const user =
            await response.json();

        setFields(user);

        localStorage.setItem("name", user.name || "");
        localStorage.setItem("email", user.email || "");
        localStorage.setItem("role", user.role || "");
        localStorage.setItem("phoneNumber", user.phoneNumber || "");
        localStorage.setItem("department", user.department || "");
        localStorage.setItem("employeeId", user.employeeId || "");
        localStorage.setItem("status", user.status || "Active");

    }
    catch (error) {

        console.error(error);

        if (window.Toast) {
            Toast.error("Profile load failed", "Unable to load your profile. Please refresh the page.");
        }

    }

}

function setFields(user) {

    document.getElementById("name").innerText = user.name || "Engineer";
    document.getElementById("email").innerText = user.email || "";
    document.getElementById("role").innerText = user.role || "";
    document.getElementById("phone").innerText = user.phoneNumber || "Not provided";
    document.getElementById("department").innerText = user.department || "Not assigned";
    document.getElementById("employeeId").innerText = user.employeeId || "Not assigned";

    const statusBadge = document.getElementById("statusBadge");
    const status = user.status || "Active";
    statusBadge.innerText = status;
    statusBadge.className = status.toLowerCase() === "active" ? "badge bg-success" : "badge bg-secondary";

}

loadProfile();

// ---- UI-only enhancement below: dark mode toggle ----

const themeBtn = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('engineer-theme');
if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
}
themeBtn.addEventListener('click', function () {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('engineer-theme', 'light');
        themeBtn.innerHTML = '<i class="bi bi-moon-stars"></i>';
    } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('engineer-theme', 'dark');
        themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
    }
});

</script>

<script src="../js/toast.js"></script>
<script src="../js/status-badges.js"></script>
</body>
</html>
