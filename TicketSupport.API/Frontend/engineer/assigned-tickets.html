<!DOCTYPE html>
<html>
<head>
    <title>Assigned Tickets</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>

        :root{
            --ink:#111827;
            --ink-2:#1b2436;
            --violet:#7C3AED;
            --indigo:#6366F1;
            --bg:#F8FAFC;
            --card:#ffffff;
            --text:#1e293b;
            --muted:#6B7280;
            --border:rgba(15,23,42,.06);
            --sidebar-w:280px;
            --shadow-sm:0 2px 10px rgba(15,23,42,.06);
            --shadow-md:0 16px 34px rgba(15,23,42,.10);
        }

        [data-theme="dark"]{
            --bg:#0b1120;
            --card:#131b2e;
            --text:#e7ecf5;
            --muted:#9aa6bd;
            --border:rgba(255,255,255,.07);
            --shadow-sm:0 2px 10px rgba(0,0,0,.35);
            --shadow-md:0 16px 34px rgba(0,0,0,.45);
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            background:var(--bg);
            color:var(--text);
            font-family:'Inter','Segoe UI',sans-serif;
            transition:background .3s ease, color .3s ease;
        }

        h2, h5, h6{ font-family:'Sora','Segoe UI',sans-serif; }

        /* ---------- SIDEBAR ---------- */

        .sidebar{
            width:var(--sidebar-w);
            height:100vh;
            position:fixed;
            left:0;
            top:0;
            background:linear-gradient(180deg,var(--ink) 0%, var(--ink-2) 100%);
            color:white;
            padding:25px 20px;
            border-radius:0 30px 30px 0;
            box-shadow:8px 0 30px rgba(0,0,0,.15);
            z-index:1000;
            transition:transform .3s ease;
            display:flex;
            flex-direction:column;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:15px;
            font-size:22px;
            font-family:'Sora',sans-serif;
            font-weight:700;
            margin-bottom:36px;
        }

        .logo i{
            color:#a78bfa;
            background:rgba(124,58,237,.18);
            width:44px;
            height:44px;
            border-radius:14px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
        }

        .menu-link{
            display:flex;
            align-items:center;
            gap:12px;
            padding:14px 18px;
            color:#CBD5E1;
            text-decoration:none;
            border-radius:15px;
            margin-bottom:8px;
            font-weight:500;
            font-size:14.5px;
            transition:.25s;
        }

        .menu-link i{ font-size:17px; width:20px; text-align:center; }

        .menu-link:hover{
            background:rgba(255,255,255,.06);
            color:white;
            transform:translateX(3px);
        }

        .menu-link.active{
            background:linear-gradient(135deg,var(--violet),var(--indigo));
            color:white;
            box-shadow:0 8px 20px rgba(99,102,241,.35);
        }

        .sidebar-footer{
            margin-top:auto;
            padding-top:16px;
            border-top:1px solid rgba(255,255,255,.08);
            font-size:12px;
            color:rgba(255,255,255,.35);
        }

        /* ---------- TOPBAR ---------- */

        .topbar{
            margin-left:var(--sidebar-w);
            position:sticky;
            top:0;
            z-index:900;
            background:var(--card);
            border-bottom:1px solid var(--border);
            padding:14px 25px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            transition:margin-left .3s ease, background .3s ease;
        }

        #sidebarToggle{
            border:none;
            background:var(--bg);
            color:var(--text);
            width:38px;
            height:38px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:background .2s ease;
        }
        #sidebarToggle:hover{ background:var(--border); }

        .icon-btn{
            border:none;
            background:var(--bg);
            color:var(--text);
            width:38px;
            height:38px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:background .2s ease, transform .2s ease;
        }
        .icon-btn:hover{ background:var(--border); transform:translateY(-1px); }

        /* ---------- MAIN ---------- */

        .main{
            margin-left:var(--sidebar-w);
            padding:25px 35px 35px;
            transition:margin-left .3s ease;
        }

        body.collapsed .sidebar{ transform:translateX(-100%); }
        body.collapsed .topbar,
        body.collapsed .main{ margin-left:0; }

        /* ---------- PAGE HEADER ---------- */

        .page-header{
            background:linear-gradient(135deg,var(--violet),var(--indigo) 65%, #4f46e5);
            color:white;
            border-radius:20px;
            padding:28px;
            margin-bottom:22px;
            position:relative;
            overflow:hidden;
            opacity:0;
            transform:translateY(14px);
            animation:fadeUp .5s ease forwards;
        }
        .page-header::after{
            content:"";
            position:absolute;
            right:-50px;
            top:-50px;
            width:240px;
            height:240px;
            background:radial-gradient(circle, rgba(255,255,255,.16), transparent 70%);
            border-radius:50%;
        }
        .page-header h2{ font-weight:700; display:flex; align-items:center; gap:10px; }
        .page-header .badge{ font-weight:600; letter-spacing:.3px; }

        @keyframes fadeUp{
            to{ opacity:1; transform:translateY(0); }
        }

        /* ---------- CARDS ---------- */

        .card{
            border:none;
            border-radius:15px;
            box-shadow:var(--shadow-sm);
            background:var(--card);
            color:var(--text);
            transition:transform .25s ease, box-shadow .25s ease, background .3s ease;
            opacity:0;
            transform:translateY(14px);
            animation:fadeUp .5s ease forwards;
        }

        .row.mb-4 > div:nth-child(1) .card{ animation-delay:.08s; }
        .row.mb-4 > div:nth-child(2) .card{ animation-delay:.13s; }
        .row.mb-4 > div:nth-child(3) .card{ animation-delay:.18s; }
        .row.mb-4 > div:nth-child(4) .card{ animation-delay:.23s; }

        .row.mb-4 .card{
            border-left:4px solid transparent;
        }
        .row.mb-4 > div:nth-child(1) .card{ border-left-color:#7C3AED; }
        .row.mb-4 > div:nth-child(2) .card{ border-left-color:#F59E0B; }
        .row.mb-4 > div:nth-child(3) .card{ border-left-color:#0EA5E9; }
        .row.mb-4 > div:nth-child(4) .card{ border-left-color:#16A34A; }

        .row.mb-4 .card:hover{
            transform:translateY(-4px);
            box-shadow:var(--shadow-md);
        }

        .row.mb-4 h6{
            font-size:12.5px;
            text-transform:uppercase;
            letter-spacing:.4px;
            font-weight:700;
        }

        .row.mb-4 h2{
            font-weight:700;
            margin-bottom:0;
        }

        /* search / filter card */
        .card.p-4.mb-4{ animation-delay:.28s; }

        .form-control, .form-select{
            background:var(--bg);
            border:1px solid var(--border);
            color:var(--text);
            border-radius:10px;
            transition:border-color .2s ease, box-shadow .2s ease;
        }
        .form-control:focus, .form-select:focus{
            border-color:var(--indigo);
            box-shadow:0 0 0 3px rgba(99,102,241,.15);
            background:var(--card);
        }

        .btn-primary{
            background:linear-gradient(135deg,var(--violet),var(--indigo));
            border:none;
            border-radius:10px;
        }
        .btn-primary:hover{
            filter:brightness(1.05);
        }

        /* table card */
        .card.p-4:last-of-type{ animation-delay:.34s; }

        .table{
            color:var(--text);
            margin-bottom:0;
        }

        .table thead.table-light th{
            background:var(--bg) !important;
            color:var(--muted);
            font-size:12.5px;
            text-transform:uppercase;
            letter-spacing:.4px;
            font-weight:700;
            border-bottom:none;
            padding:14px 12px;
        }

        .table td{
            padding:14px 12px;
            vertical-align:middle;
            border-color:var(--border);
        }

        .table tbody tr{
            transition:background .15s ease;
        }
        .table tbody tr:hover{
            background:rgba(124,58,237,.06);
        }

        /* empty state */
        #ticketTableBody:empty::before{
            content:"No tickets match your filters yet.";
            display:block;
            text-align:center;
            padding:40px;
            color:var(--muted);
        }

        ::-webkit-scrollbar{ width:8px; height:8px; }
        ::-webkit-scrollbar-thumb{ background:rgba(100,116,139,.35); border-radius:8px; }

        @media (max-width: 992px){
            .sidebar{ transform:translateX(-100%); border-radius:0; }
            .topbar, .main{ margin-left:0; }
            body.collapsed .sidebar{ transform:translateX(0); }
        }

        :focus-visible{
            outline:2px solid var(--indigo);
            outline-offset:2px;
        }

        @media (prefers-reduced-motion: reduce){
            *{ animation:none !important; transition:none !important; }
        }

    </style>

    <link href="../css/design-system.css" rel="stylesheet">
</head>

<body id="assignedTicketsPage">

<div class="sidebar">

    <div class="logo">

        <i class="bi bi-tools"></i>

        Engineer Panel

    </div>

    <a href="dashboard.html"
       class="menu-link">

        <i class="bi bi-speedometer2"></i>

        Dashboard

    </a>

    <a href="assigned-tickets.html"
       class="menu-link active">

        <i class="bi bi-ticket"></i>

        Assigned Tickets

    </a>

    <a href="profile.html"
       class="menu-link">

        <i class="bi bi-person-circle"></i>

        Profile

    </a>

    <a href="#"
       class="menu-link"
       onclick="logout()">

        <i class="bi bi-box-arrow-right"></i>

        Logout

    </a>

    <div class="sidebar-footer">
        &copy; 2026 Engineer Panel
    </div>

</div>

<div class="topbar">

    <button id="sidebarToggle" title="Toggle sidebar" aria-label="Toggle sidebar">
        <i class="bi bi-list" style="font-size:19px;"></i>
    </button>

    <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
        <i class="bi bi-moon-stars"></i>
    </button>

</div>

<div class="main">

    <div class="page-header">

        <span class="badge bg-light text-primary mb-3 px-3 py-2">

            Engineer Workspace

        </span>

        <h2 class="fw-bold">

            <i class="bi bi-ticket-perforated"></i>

            Assigned Tickets

        </h2>

        <p class="mb-0 fs-5">

            View, manage and resolve your assigned IT support requests.

        </p>

    </div>

    <div class="row mb-4">

        <div class="col-md-3">

            <div class="card p-3">

                <h6 class="text-muted">

                    Assigned

                </h6>

                <h2 id="assignedCount">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-3">

                <h6 class="text-muted">

                    Open

                </h6>

                <h2 id="openCount">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-3">

                <h6 class="text-muted">

                    In Progress

                </h6>

                <h2 id="progressCount">0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-3">

                <h6 class="text-muted">

                    Resolved

                </h6>

                <h2 id="resolvedCount">0</h2>

            </div>

        </div>

    </div>

    <!-- Search -->

    <div class="card p-4 mb-4">

        <div class="row g-3">

            <div class="col-md-5">

                <input
                    id="searchBox"
                    type="text"
                    class="form-control"
                    placeholder="Search by Ticket ID, Title or Category">

            </div>

            <div class="col-md-3">

                <select
                    id="statusFilter"
                    class="form-select">

                    <option value="All">All Status</option>
                    <option value="Open">Open</option>
                    <option value="InProgress">In Progress</option>
                    <option value="Resolved">Resolved</option>

                </select>

            </div>

            <div class="col-md-3">

                <select
                    id="priorityFilter"
                    class="form-select">

                    <option value="All">All Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>

                </select>

            </div>

            <div class="col-md-1">

                <button
                    class="btn btn-primary w-100">

                    <i class="bi bi-search"></i>

                </button>

            </div>

        </div>

    </div>

    <!-- Tickets Table -->

    <div class="card p-4">

        <div class="table-responsive">

            <table class="table table-hover">

                <thead class="table-light">

                    <tr>

                        <th>ID</th>

                        <th>Title</th>

                        <th>Category</th>

                        <th>Priority</th>

                        <th>Status</th>

                        <th>Created</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="ticketTableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>
    // ---- UI-only enhancements below. Nothing here touches ticket data/logic. ----

    // Sidebar collapse toggle
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.body.classList.toggle('collapsed');
    });

    // Dark mode toggle (shared preference with the Engineer Dashboard page)
    const themeBtn = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('engineer-theme');
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
    }
    themeBtn.addEventListener('click', function () {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('engineer-theme', 'light');
            themeBtn.innerHTML = '<i class="bi bi-moon-stars"></i>';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('engineer-theme', 'dark');
            themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
        }
    });
</script>

<script src="../js/toast.js"></script>
<script src="../js/status-badges.js"></script>
<script src="../js/engineer.js"></script>

</body>
</html>
