<!DOCTYPE html>
<html>
<head>
    <title>Admin Profile</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        :root{
            --navy:#0f172a;
            --navy-2:#16213e;
            --blue:#2563eb;
            --blue-light:#3b82f6;
            --bg:#f4f6f9;
            --card:#ffffff;
            --text:#1e293b;
            --muted:#64748b;
            --border:rgba(15,23,42,.06);
            --sidebar-w:250px;
            --shadow-sm:0 2px 10px rgba(15,23,42,.06);
            --shadow-md:0 12px 30px rgba(15,23,42,.10);
        }

        [data-theme="dark"]{
            --bg:#0b1220;
            --card:#111a2e;
            --text:#e7ecf5;
            --muted:#93a2ba;
            --border:rgba(255,255,255,.06);
            --shadow-sm:0 2px 10px rgba(0,0,0,.35);
            --shadow-md:0 12px 30px rgba(0,0,0,.45);
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            background:var(--bg);
            color:var(--text);
            font-family:'Inter','Segoe UI',sans-serif;
            transition:background .3s ease, color .3s ease;
        }

        h2, h3, h5, h6{
            font-family:'Sora','Segoe UI',sans-serif;
        }

        /* ---------- SIDEBAR ---------- */

        .sidebar{
            width:var(--sidebar-w);
            height:100vh;
            background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
            position:fixed;
            top:0;
            left:0;
            color:white;
            display:flex;
            flex-direction:column;
            z-index:1000;
            transition:transform .3s ease, width .3s ease;
            box-shadow:4px 0 24px rgba(0,0,0,.15);
        }

        .logo{
            padding:22px 20px;
            font-size:20px;
            font-family:'Sora',sans-serif;
            font-weight:700;
            border-bottom:1px solid rgba(255,255,255,.08);
            display:flex;
            align-items:center;
            gap:10px;
            letter-spacing:.3px;
        }

        .logo i{
            color:#60a5fa;
            font-size:22px;
        }

        .menu-wrap{
            padding:14px 12px;
            display:flex;
            flex-direction:column;
            gap:4px;
        }

        .menu-link{
            display:flex;
            align-items:center;
            gap:12px;
            color:rgba(255,255,255,.75);
            text-decoration:none;
            padding:12px 14px;
            border-radius:10px;
            font-size:14.5px;
            font-weight:500;
            position:relative;
            transition:background .2s ease, color .2s ease, transform .2s ease;
        }

        .menu-link i{
            font-size:17px;
            width:20px;
            text-align:center;
        }

        .menu-link:hover{
            background:rgba(255,255,255,.08);
            color:#fff;
            transform:translateX(3px);
        }

        .menu-link.active{
            background:linear-gradient(90deg,var(--blue),var(--blue-light));
            color:#fff;
            box-shadow:0 6px 16px rgba(37,99,235,.35);
        }

        .menu-link.active::before{
            content:"";
            position:absolute;
            left:-12px;
            top:50%;
            transform:translateY(-50%);
            width:4px;
            height:60%;
            background:#60a5fa;
            border-radius:4px;
        }

        .sidebar-footer{
            margin-top:auto;
            padding:16px 20px;
            font-size:12px;
            color:rgba(255,255,255,.35);
            border-top:1px solid rgba(255,255,255,.08);
        }

        /* ---------- TOPBAR ---------- */

        .topbar{
            margin-left:var(--sidebar-w);
            position:sticky;
            top:0;
            z-index:900;
            background:var(--card);
            border-bottom:1px solid var(--border);
            padding:14px 25px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            transition:margin-left .3s ease, background .3s ease;
        }

        .topbar-left{
            display:flex;
            align-items:center;
            gap:14px;
        }

        #sidebarToggle{
            border:none;
            background:var(--bg);
            color:var(--text);
            width:38px;
            height:38px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:background .2s ease;
        }
        #sidebarToggle:hover{ background:var(--border); }

        .topbar-right{
            display:flex;
            align-items:center;
            gap:16px;
        }

        .icon-btn{
            border:none;
            background:var(--bg);
            color:var(--text);
            width:38px;
            height:38px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            position:relative;
            transition:background .2s ease, transform .2s ease;
        }
        .icon-btn:hover{ background:var(--border); transform:translateY(-1px); }

        .avatar{
            width:38px;
            height:38px;
            border-radius:50%;
            background:linear-gradient(135deg,var(--blue),#7c3aed);
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            font-size:14px;
        }

        /* ---------- MAIN ---------- */

        .main{
            margin-left:var(--sidebar-w);
            padding:25px;
            transition:margin-left .3s ease;
        }

        body.collapsed .sidebar{ transform:translateX(-100%); }
        body.collapsed .topbar,
        body.collapsed .main{ margin-left:0; }

        .page-head{
            display:flex;
            align-items:flex-end;
            justify-content:space-between;
            flex-wrap:wrap;
            gap:10px;
            margin-bottom:20px;
        }

        .page-head h2{
            font-weight:700;
            margin-bottom:2px;
        }

        .text-muted{ color:var(--muted) !important; }

        /* ---------- PROFILE CARD ---------- */

        .card{
            border:none;
            border-radius:18px;
            box-shadow:var(--shadow-sm);
            background:var(--card);
            color:var(--text);
            opacity:0;
            transform:translateY(14px);
            animation:fadeUp .5s ease forwards;
        }

        @keyframes fadeUp{
            to{ opacity:1; transform:translateY(0); }
        }

        .profile-banner{
            height:110px;
            border-radius:18px 18px 0 0;
            background:linear-gradient(135deg,#2563eb,#1e40af 60%, #6d28d9);
            position:relative;
            overflow:hidden;
        }
        .profile-banner::after{
            content:"";
            position:absolute;
            right:-40px;
            top:-40px;
            width:220px;
            height:220px;
            background:radial-gradient(circle, rgba(255,255,255,.18), transparent 70%);
            border-radius:50%;
        }

        .profile-avatar-lg{
            width:92px;
            height:92px;
            border-radius:50%;
            background:linear-gradient(135deg,var(--blue),var(--navy));
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:36px;
            font-weight:700;
            font-family:'Sora',sans-serif;
            border:5px solid var(--card);
            margin:-50px auto 0;
            box-shadow:var(--shadow-sm);
            position:relative;
            z-index:2;
        }

        .profile-body{
            padding:8px 34px 30px;
            text-align:center;
        }

        .profile-body h3{ margin-bottom:2px; }

        .role-line{
            color:var(--muted);
            font-size:14px;
            margin-bottom:10px;
        }

        .info-list{
            text-align:left;
            margin-top:14px;
        }

        .info-row{
            display:flex;
            align-items:center;
            gap:14px;
            padding:14px 4px;
            border-bottom:1px solid var(--border);
        }
        .info-row:last-child{ border-bottom:none; }

        .info-row i{
            width:38px;
            height:38px;
            border-radius:10px;
            background:rgba(37,99,235,.1);
            color:var(--blue);
            display:flex;
            align-items:center;
            justify-content:center;
            flex-shrink:0;
        }

        .info-row .info-text strong{
            display:block;
            font-size:11.5px;
            text-transform:uppercase;
            letter-spacing:.4px;
            color:var(--muted);
            font-weight:700;
            margin-bottom:2px;
        }

        .info-row .info-text span{
            font-size:15px;
            font-weight:500;
            word-break:break-word;
        }

        .workload-stats{
            display:grid;
            grid-template-columns:repeat(4, 1fr);
            gap:12px;
            margin-top:24px;
            padding-top:22px;
            border-top:1px solid var(--border);
        }
        .workload-stat{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:2px;
            padding:16px 6px;
            border-radius:14px;
            background:rgba(37,99,235,.06);
        }
        .workload-value{
            font-size:24px;
            font-weight:800;
            color:var(--text);
        }
        .workload-label{
            font-size:11px;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:.3px;
            color:var(--muted);
        }
        @media (max-width:600px){
            .workload-stats{ grid-template-columns:repeat(2, 1fr); }
        }

        .badge.bg-success{
            background:rgba(22,163,74,.12) !important;
            color:#16A34A !important;
            font-weight:700;
            padding:6px 14px;
            border-radius:20px;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }
        .badge.bg-success::before{
            content:"";
            width:7px;
            height:7px;
            border-radius:50%;
            background:#16A34A;
        }

        /* scrollbar */
        ::-webkit-scrollbar{ width:8px; height:8px; }
        ::-webkit-scrollbar-thumb{ background:rgba(100,116,139,.35); border-radius:8px; }

        @media (max-width: 900px){
            .sidebar{ transform:translateX(-100%); }
            .topbar, .main{ margin-left:0; }
            body.collapsed .sidebar{ transform:translateX(0); }
        }

        :focus-visible{
            outline:2px solid var(--blue-light);
            outline-offset:2px;
        }

        @media (prefers-reduced-motion: reduce){
            *{ animation:none !important; transition:none !important; }
        }

    </style>

    <link href="../css/design-system.css" rel="stylesheet">
</head>

<body>

<div class="sidebar">

    <div class="logo">
        <i class="bi bi-shield-check"></i>
        Admin Panel
    </div>

    <div class="menu-wrap">

        <a href="dashboard.html"
           class="menu-link">

            <i class="bi bi-grid-1x2"></i>
            Dashboard

        </a>

        <a href="users.html"
           class="menu-link">

            <i class="bi bi-people"></i>
            Manage Users

        </a>

        <a href="reports.html"
           class="menu-link">

            <i class="bi bi-bar-chart"></i>
            Reports

        </a>

        <a href="profile.html"
           class="menu-link active">

            <i class="bi bi-person-circle"></i>
            Profile

        </a>

        <a href="#"
           class="menu-link"
           onclick="logout()">

            <i class="bi bi-box-arrow-right"></i>
            Logout

        </a>

    </div>

    <div class="sidebar-footer">
        &copy; 2026 Admin Panel
    </div>

</div>

<div class="topbar">

    <div class="topbar-left">
        <button id="sidebarToggle" title="Toggle sidebar" aria-label="Toggle sidebar">
            <i class="bi bi-list" style="font-size:20px;"></i>
        </button>
    </div>

    <div class="topbar-right">
        <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
            <i class="bi bi-moon-stars"></i>
        </button>

        <div class="avatar" id="topAvatar">A</div>
    </div>

</div>

<div class="main">

    <div class="page-head">

        <div>
            <h2>My Profile</h2>
            <p class="text-muted mb-0">View your account details</p>
        </div>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8">

            <div class="card p-0">

                <div class="profile-banner"></div>

                <div class="profile-avatar-lg" id="avatarInitial">A</div>

                <div class="profile-body">

                    <h3 id="name">Admin</h3>
                    <p class="role-line" id="role">Admin</p>

                    <div class="info-list">

                        <div class="info-row">
                            <i class="bi bi-envelope"></i>
                            <div class="info-text">
                                <strong>Email</strong>
                                <span id="email"></span>
                            </div>
                        </div>

                        <div class="info-row">
                            <i class="bi bi-telephone"></i>
                            <div class="info-text">
                                <strong>Phone Number</strong>
                                <span id="phone"></span>
                            </div>
                        </div>

                        <div class="info-row">
                            <i class="bi bi-person-badge"></i>
                            <div class="info-text">
                                <strong>Employee ID</strong>
                                <span id="employeeId"></span>
                            </div>
                        </div>

                        <div class="info-row">
                            <i class="bi bi-diagram-3"></i>
                            <div class="info-text">
                                <strong>Department</strong>
                                <span id="department"></span>
                            </div>
                        </div>

                        <div class="info-row">
                            <i class="bi bi-calendar-check"></i>
                            <div class="info-text">
                                <strong>Member Since</strong>
                                <span id="memberSince"></span>
                            </div>
                        </div>

                        <div class="info-row">
                            <i class="bi bi-shield-check"></i>
                            <div class="info-text">
                                <strong>Status</strong><br>
                                <span class="badge bg-success" id="statusBadge">
                                    Active
                                </span>
                            </div>
                        </div>

                    </div>

                    <div class="workload-stats" id="platformStats">

                        <div class="workload-stat">
                            <span class="workload-value" id="statUsers">-</span>
                            <span class="workload-label">Total Users</span>
                        </div>

                        <div class="workload-stat">
                            <span class="workload-value" id="statTickets">-</span>
                            <span class="workload-label">Total Tickets</span>
                        </div>

                        <div class="workload-stat">
                            <span class="workload-value" id="statOpen">-</span>
                            <span class="workload-label">Open</span>
                        </div>

                        <div class="workload-stat">
                            <span class="workload-value" id="statResolved">-</span>
                            <span class="workload-label">Resolved</span>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="../js/toast.js"></script>
<script src="../js/status-badges.js"></script>

<script>

    // Sidebar collapse toggle
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.body.classList.toggle('collapsed');
    });

    // Dark mode toggle (shared preference across all admin pages)
    const themeBtn = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('admin-theme');
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
    }
    themeBtn.addEventListener('click', function () {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('admin-theme', 'light');
            themeBtn.innerHTML = '<i class="bi bi-moon-stars"></i>';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('admin-theme', 'dark');
            themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
        }
    });

    async function loadAdminProfile() {

        const token = localStorage.getItem("token");
        const userId = localStorage.getItem("userId");

        document.getElementById("name").innerText =
            localStorage.getItem("name") || "Admin";
        document.getElementById("role").innerText =
            localStorage.getItem("role") || "Admin";

        try {

            const response =
                await fetch(
                    `https://ticket-support-api-uyjm.onrender.com/api/Users/${userId}`,
                    {
                        headers: {
                            "Authorization": `Bearer ${token}`
                        }
                    });

            if (!response.ok) {
                throw new Error("Failed to load profile.");
            }

            const user = await response.json();

            document.getElementById("name").innerText = user.name;
            document.getElementById("role").innerText = user.role;
            document.getElementById("email").innerText = user.email || "-";
            document.getElementById("phone").innerText = user.phoneNumber || "-";
            document.getElementById("employeeId").innerText = user.employeeId || "-";
            document.getElementById("department").innerText = user.department || "-";

            document.getElementById("memberSince").innerText =
                user.createdDate
                    ? new Date(user.createdDate).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" })
                    : "-";

            const statusBadge = document.getElementById("statusBadge");
            if (user.isActive === false) {
                statusBadge.textContent = "Inactive";
                statusBadge.className = "badge bg-secondary";
            } else {
                statusBadge.textContent = "Active";
                statusBadge.className = "badge bg-success";
            }

            if (user.name) {
                localStorage.setItem("name", user.name);
            }

            const initial = (user.name || "A").trim().charAt(0).toUpperCase() || "A";
            document.getElementById("avatarInitial").innerText = initial;
            document.getElementById("topAvatar").innerText = initial;

        }
        catch (error) {

            console.error(error);

            Toast.error("Profile Load Failed", "Unable to load your profile. Please refresh the page.");
        }

        // Platform-wide stats (reuses the existing Admin dashboard summary)
        try {

            const summaryResponse =
                await fetch(
                    "https://ticket-support-api-uyjm.onrender.com/api/Dashboard/admin",
                    {
                        headers: {
                            "Authorization": `Bearer ${token}`
                        }
                    });

            if (summaryResponse.ok) {

                const summary = await summaryResponse.json();

                document.getElementById("statUsers").innerText = summary.totalUsers ?? 0;
                document.getElementById("statTickets").innerText = summary.totalTickets ?? 0;
                document.getElementById("statOpen").innerText = summary.openTickets ?? 0;
                document.getElementById("statResolved").innerText = summary.resolvedTickets ?? 0;
            }

        }
        catch (error) {

            console.error(error);
            // Non-critical — leave stats as "-" if this fails
        }
    }

    loadAdminProfile();

</script>

</body>
</html>
