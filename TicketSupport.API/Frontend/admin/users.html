<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        :root{
            --navy:#0f172a;
            --navy-2:#16213e;
            --blue:#2563eb;
            --blue-light:#3b82f6;
            --bg:#f4f6f9;
            --card:#ffffff;
            --text:#1e293b;
            --muted:#64748b;
            --border:rgba(15,23,42,.06);
            --sidebar-w:250px;
            --shadow-sm:0 2px 10px rgba(15,23,42,.06);
            --shadow-md:0 12px 30px rgba(15,23,42,.10);
        }

        [data-theme="dark"]{
            --bg:#0b1220;
            --card:#111a2e;
            --text:#e7ecf5;
            --muted:#93a2ba;
            --border:rgba(255,255,255,.06);
            --shadow-sm:0 2px 10px rgba(0,0,0,.35);
            --shadow-md:0 12px 30px rgba(0,0,0,.45);
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            background:var(--bg);
            color:var(--text);
            font-family:'Inter','Segoe UI',sans-serif;
            transition:background .3s ease, color .3s ease;
        }

        h2, h3, h5, h6{
            font-family:'Sora','Segoe UI',sans-serif;
        }

        /* ---------- SIDEBAR ---------- */

        .sidebar{
            width:var(--sidebar-w);
            height:100vh;
            background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
            position:fixed;
            top:0;
            left:0;
            color:white;
            display:flex;
            flex-direction:column;
            z-index:1000;
            transition:transform .3s ease, width .3s ease;
            box-shadow:4px 0 24px rgba(0,0,0,.15);
        }

        .logo{
            padding:22px 20px;
            font-size:20px;
            font-family:'Sora',sans-serif;
            font-weight:700;
            border-bottom:1px solid rgba(255,255,255,.08);
            display:flex;
            align-items:center;
            gap:10px;
            letter-spacing:.3px;
        }

        .logo i{
            color:#60a5fa;
            font-size:22px;
        }

        .menu-wrap{
            padding:14px 12px;
            display:flex;
            flex-direction:column;
            gap:4px;
        }

        .menu-link{
            display:flex;
            align-items:center;
            gap:12px;
            color:rgba(255,255,255,.75);
            text-decoration:none;
            padding:12px 14px;
            border-radius:10px;
            font-size:14.5px;
            font-weight:500;
            position:relative;
            transition:background .2s ease, color .2s ease, transform .2s ease;
        }

        .menu-link i{
            font-size:17px;
            width:20px;
            text-align:center;
        }

        .menu-link:hover{
            background:rgba(255,255,255,.08);
            color:#fff;
            transform:translateX(3px);
        }

        .menu-link.active{
            background:linear-gradient(90deg,var(--blue),var(--blue-light));
            color:#fff;
            box-shadow:0 6px 16px rgba(37,99,235,.35);
        }

        .menu-link.active::before{
            content:"";
            position:absolute;
            left:-12px;
            top:50%;
            transform:translateY(-50%);
            width:4px;
            height:60%;
            background:#60a5fa;
            border-radius:4px;
        }

        .sidebar-footer{
            margin-top:auto;
            padding:16px 20px;
            font-size:12px;
            color:rgba(255,255,255,.35);
            border-top:1px solid rgba(255,255,255,.08);
        }

        /* ---------- TOPBAR ---------- */

        .topbar{
            margin-left:var(--sidebar-w);
            position:sticky;
            top:0;
            z-index:900;
            background:var(--card);
            border-bottom:1px solid var(--border);
            padding:14px 25px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            transition:margin-left .3s ease, background .3s ease;
        }

        .topbar-left{
            display:flex;
            align-items:center;
            gap:14px;
        }

        #sidebarToggle{
            border:none;
            background:var(--bg);
            color:var(--text);
            width:38px;
            height:38px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:background .2s ease;
        }
        #sidebarToggle:hover{ background:var(--border); }

        .topbar-right{
            display:flex;
            align-items:center;
            gap:16px;
        }

        .icon-btn{
            border:none;
            background:var(--bg);
            color:var(--text);
            width:38px;
            height:38px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            position:relative;
            transition:background .2s ease, transform .2s ease;
        }
        .icon-btn:hover{ background:var(--border); transform:translateY(-1px); }

        .dot{
            position:absolute;
            top:7px;
            right:8px;
            width:7px;
            height:7px;
            border-radius:50%;
            background:#ef4444;
            border:2px solid var(--card);
        }

        .avatar{
            width:38px;
            height:38px;
            border-radius:50%;
            background:linear-gradient(135deg,var(--blue),#7c3aed);
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            font-size:14px;
        }

        /* ---------- MAIN ---------- */

        .main{
            margin-left:var(--sidebar-w);
            padding:25px;
            transition:margin-left .3s ease;
        }

        body.collapsed .sidebar{ transform:translateX(-100%); }
        body.collapsed .topbar,
        body.collapsed .main{ margin-left:0; }

        /* ---------- HEADER BANNER ---------- */

        .page-header{
            background:linear-gradient(135deg,#2563eb,#1e40af 60%, #6d28d9);
            color:white;
            border-radius:16px;
            padding:28px;
            margin-bottom:24px;
            position:relative;
            overflow:hidden;
            opacity:0;
            transform:translateY(14px);
            animation:fadeUp .5s ease forwards;
        }
        .page-header::after{
            content:"";
            position:absolute;
            right:-40px;
            top:-40px;
            width:220px;
            height:220px;
            background:radial-gradient(circle, rgba(255,255,255,.18), transparent 70%);
            border-radius:50%;
        }
        .page-header h2{ font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:10px; }

        @keyframes fadeUp{
            to{ opacity:1; transform:translateY(0); }
        }

        /* ---------- TABLE CARD ---------- */

        .card{
            border:none;
            border-radius:16px;
            box-shadow:var(--shadow-sm);
            background:var(--card);
            color:var(--text);
            opacity:0;
            transform:translateY(14px);
            animation:fadeUp .5s ease forwards;
            animation-delay:.12s;
        }

        /* search input */
        .form-control{
            background:var(--bg);
            border:1px solid var(--border);
            color:var(--text);
            border-radius:10px;
            padding:10px 14px 10px 40px;
            transition:border-color .2s ease, box-shadow .2s ease;
        }
        .form-control:focus{
            border-color:var(--blue-light);
            box-shadow:0 0 0 3px rgba(59,130,246,.15);
            background:var(--card);
        }

        .search-wrap{
            position:relative;
        }
        .search-wrap i{
            position:absolute;
            left:14px;
            top:50%;
            transform:translateY(-50%);
            color:var(--muted);
            pointer-events:none;
        }

        /* table */
        .table{
            color:var(--text);
            margin-bottom:0;
        }

        .table thead.table-light th{
            background:var(--bg) !important;
            color:var(--muted);
            font-size:12.5px;
            text-transform:uppercase;
            letter-spacing:.4px;
            font-weight:700;
            border-bottom:none;
            padding:14px 12px;
        }

        .table tbody tr{
            transition:background .15s ease, transform .15s ease;
        }

        .table tbody tr:hover{
            background:rgba(37,99,235,.05);
        }

        .table td{
            padding:14px 12px;
            vertical-align:middle;
            border-color:var(--border);
        }

        [data-theme="dark"] .table-hover > tbody > tr:hover > *{
            color:var(--text);
        }

        /* empty state (shown only if userTableBody has no rows) */
        #userTableBody:empty::after{
            content:"No users to display yet.";
        }
        #userTableBody:empty{
            display:table-row-group;
        }
        #userTableBody:empty::before{
            content:"";
            display:table-row;
        }

        .empty-hint{
            display:none;
            padding:40px 20px;
            text-align:center;
            color:var(--muted);
        }
        #userTableBody:empty ~ .empty-hint{ display:block; }

        /* scrollbar */
        ::-webkit-scrollbar{ width:8px; height:8px; }
        ::-webkit-scrollbar-thumb{ background:rgba(100,116,139,.35); border-radius:8px; }

        @media (max-width: 900px){
            .sidebar{ transform:translateX(-100%); }
            .topbar, .main{ margin-left:0; }
            body.collapsed .sidebar{ transform:translateX(0); }
        }

        :focus-visible{
            outline:2px solid var(--blue-light);
            outline-offset:2px;
        }

        @media (prefers-reduced-motion: reduce){
            *{ animation:none !important; transition:none !important; }
        }

    </style>

    <link href="../css/design-system.css" rel="stylesheet">
</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="bi bi-shield-check"></i>

        Admin Panel

    </div>

    <div class="menu-wrap">

        <a href="dashboard.html"
           class="menu-link">

            <i class="bi bi-grid-1x2"></i>
            Dashboard

        </a>

        <a href="users.html"
           class="menu-link active">

            <i class="bi bi-people"></i>
            Manage Users

        </a>

        <a href="reports.html"
           class="menu-link">

            <i class="bi bi-bar-chart"></i>
            Reports

        </a>

        <a href="#"
           class="menu-link"
           onclick="logout()">

            <i class="bi bi-box-arrow-right"></i>
            Logout

        </a>

    </div>

    <div class="sidebar-footer">
        &copy; 2026 Admin Panel
    </div>

</div>

<div class="topbar">

    <div class="topbar-left">
        <button id="sidebarToggle" title="Toggle sidebar" aria-label="Toggle sidebar">
            <i class="bi bi-list" style="font-size:20px;"></i>
        </button>
    </div>

    <div class="topbar-right">
        <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
            <i class="bi bi-moon-stars"></i>
        </button>

        <button class="icon-btn" title="Notifications" aria-label="Notifications">
            <i class="bi bi-bell"></i>
            <span class="dot"></span>
        </button>

        <a href="profile.html" class="user-chip text-decoration-none" title="My Profile">
            <div class="avatar" id="userAvatar">A</div>
            <span class="user-name" id="userName">Admin</span>
        </a>
    </div>

</div>

<div class="main">

    <div class="page-header">

        <h2>
            <i class="bi bi-people"></i>
            User Management
        </h2>

        <p class="mb-0">
            Manage Employees, Engineers and Admins
        </p>

    </div>

    <div class="card p-4">

        <div class="row mb-3">

            <div class="col-md-6">

                <div class="search-wrap">
                    <i class="bi bi-search"></i>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="Search users...">
                </div>

            </div>

        </div>

        <div class="table-responsive">

            <table class="table table-hover">

                <thead class="table-light">

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="userTableBody">

                </tbody>

            </table>

        </div>

        <div class="empty-hint">
            <i class="bi bi-inbox" style="font-size:28px;"></i>
            <p class="mb-0 mt-2">No users to display yet.</p>
        </div>

   </div>

</div>

<!-- ================= USER DETAILS MODAL ================= -->
<div class="modal fade" id="userDetailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border:none;border-radius:18px;overflow:hidden;">

            <div style="background:linear-gradient(135deg,#2563eb,#1e40af 60%, #6d28d9);padding:28px 24px;color:#fff;position:relative;">

                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" style="position:absolute;top:16px;right:16px;"></button>

                <div style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin-bottom:12px;" id="udAvatar">?</div>

                <h5 class="mb-0" id="udName" style="font-weight:700;">Loading...</h5>
                <small style="opacity:.85;" id="udRoleLine"><span id="udRole">-</span></small>

            </div>

            <div class="modal-body p-4">

                <div class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Email</span>
                    <span id="udEmail" class="fw-medium">-</span>
                </div>

                <div class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Phone Number</span>
                    <span id="udPhone" class="fw-medium">-</span>
                </div>

                <div class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Employee ID</span>
                    <span id="udEmployeeId" class="fw-medium">-</span>
                </div>

                <div class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Department</span>
                    <span id="udDepartment" class="fw-medium">-</span>
                </div>

                <div class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Member Since</span>
                    <span id="udMemberSince" class="fw-medium">-</span>
                </div>

                <div class="d-flex justify-content-between py-2">
                    <span class="text-muted">Status</span>
                    <span id="udStatus">-</span>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ---- UI-only enhancements below. Nothing here touches user data/logic. ----

    // Sidebar collapse toggle
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.body.classList.toggle('collapsed');
    });

    // Dark mode toggle (shared preference across all admin pages)
    const themeBtn = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('admin-theme');
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
    }
    themeBtn.addEventListener('click', function () {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('admin-theme', 'light');
            themeBtn.innerHTML = '<i class="bi bi-moon-stars"></i>';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('admin-theme', 'dark');
            themeBtn.innerHTML = '<i class="bi bi-sun"></i>';
        }
    });
</script>

<script src="../js/toast.js"></script>
<script src="../js/status-badges.js"></script>
<script src="../js/admin.js"></script>

</body>
</html>
