<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Ticket Support System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root {
            --navy: #10152a;
            --teal: #14b8c9;
            --teal-dark: #0d97a6;
            --purple: #7c5cf0;
            --purple-dark: #4f38c9;
            --bg: #eef1f8;
            --shadow: 0 20px 60px rgba(16, 21, 42, 0.12);
            --text-dark: #1b2036;
            --text-muted: #8b93a7;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-dark);
            padding: 40px 20px;
        }

        .register-container {
            width: 1100px;
            max-width: 100%;
            display: flex;
            background: #fff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        /* ===== LEFT PANEL ===== */

        .left-panel {
            width: 42%;
            background: linear-gradient(160deg, var(--navy) 0%, #1c2550 60%, var(--purple-dark) 130%);
            color: #fff;
            padding: 56px 48px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(20,184,201,0.25), transparent 70%);
            top: -120px;
            right: -140px;
        }

        .left-panel::after {
            content: "";
            position: absolute;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,92,240,0.25), transparent 70%);
            bottom: -90px;
            left: -90px;
        }

        .left-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 34px;
            position: relative;
            z-index: 1;
        }

        .left-brand .brand-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .left-brand span {
            font-weight: 700;
            font-size: 14.5px;
            letter-spacing: 0.02em;
        }

        .left-panel h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            line-height: 1.2;
        }

        .left-panel > p {
            font-size: 15px;
            color: #c4c9de;
            line-height: 1.6;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            font-size: 14.5px;
            font-weight: 500;
            color: #e4e6f2;
            position: relative;
            z-index: 1;
        }

        .feature .check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(20, 184, 201, 0.2);
            color: var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        /* ===== RIGHT PANEL ===== */

        .right-panel {
            width: 58%;
            padding: 48px 52px;
        }

        .right-panel h2 {
            text-align: center;
            margin-bottom: 6px;
            font-weight: 800;
            font-size: 24px;
            color: var(--text-dark);
        }

        .right-panel > p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 28px;
            font-size: 14px;
        }

        .form-control,
        .form-select {
            height: 50px;
            border-radius: 13px;
            background: #f5f6fb;
            border: 1px solid #eceef5;
            font-size: 14.5px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 3px rgba(20, 184, 201, 0.15);
            border-color: var(--teal);
            background: #fff;
        }

        .btn-register {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 10px 24px rgba(20, 184, 201, 0.3);
            transition: all .2s ease;
        }

        .btn-register:hover {
            background: linear-gradient(135deg, var(--teal-dark), var(--teal-dark));
            transform: translateY(-1px);
        }

        .login-link {
            text-align: center;
            margin-top: 22px;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--purple);
            font-weight: 700;
            text-decoration: none;
        }

        .login-link a:hover {
            color: var(--purple-dark);
            text-decoration: underline;
        }

        @media (max-width: 900px) {

            .register-container {
                flex-direction: column;
                width: 95%;
            }

            .left-panel,
            .right-panel {
                width: 100%;
            }

            .right-panel { padding: 40px 28px; }
        }

    </style>

    <link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="register-container">

    <!-- Left Side -->

    <div class="left-panel">

        <div class="left-brand">
            <div class="brand-icon"><i class="bi bi-headset"></i></div>
            <span>AI HELP DESK</span>
        </div>

        <h1>
            AI Ticket Support
        </h1>

        <p>
            Create your account and start managing
            support requests efficiently.
        </p>

        <div class="feature">
            <span class="check"><i class="bi bi-check-lg"></i></span> AI Ticket Analysis
        </div>

        <div class="feature">
            <span class="check"><i class="bi bi-check-lg"></i></span> Smart Suggestions
        </div>

        <div class="feature">
            <span class="check"><i class="bi bi-check-lg"></i></span> Ticket Tracking
        </div>

        <div class="feature">
            <span class="check"><i class="bi bi-check-lg"></i></span> Reports &amp; Analytics
        </div>

        <div class="feature">
            <span class="check"><i class="bi bi-check-lg"></i></span> Engineer Assignment
        </div>

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <h2>
            Create Account
        </h2>

        <p>
            Register to access the system
        </p>

        <div class="row">

            <div class="col-md-6 mb-3">

                <input
                    type="text"
                    id="name"
                    class="form-control"
                    placeholder="Full Name">

            </div>

            <div class="col-md-6 mb-3">

                <input
                    type="text"
                    id="employeeId"
                    class="form-control"
                    placeholder="Employee ID">

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Email Address">

            </div>

            <div class="col-md-6 mb-3">

                <input
                    type="text"
                    id="phoneNumber"
                    class="form-control"
                    placeholder="Phone Number">

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Password">

            </div>

            <div class="col-md-6 mb-3">

                <input
                    type="text"
                    id="department"
                    class="form-control"
                    placeholder="Department">

            </div>

        </div>

        <div class="mb-3">

            <select
                id="role"
                class="form-select">

                <option value="Employee">
                    Employee
                </option>

                <option value="Engineer">
                    Engineer
                </option>

                <option value="Admin">
                    Admin
                </option>

            </select>

        </div>

        <button
            class="btn-register"
            onclick="register()">

            Create Account

        </button>

        <div class="login-link">

            <a href="login.html">

                Already have an account? Login

            </a>

        </div>

    </div>

</div>

<script src="js/register.js"></script>

<script src="js/toast.js"></script>
<script src="js/status-badges.js"></script>
</body>
</html>
